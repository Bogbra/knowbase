version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/knowbase
  REDIS_URL: redis://redis:6379/0
  ENVIRONMENT: development
  DEBUG: "true"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowbase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowbase"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # maxmemory must stay below the container limit (300m) to avoid Redis OOM-killing itself
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 300m
        reservations:
          memory: 128m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app
      - /app/.venv
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 256m

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv
    command: ["python", "-m", "arq", "app.workers.arq_settings.WorkerSettings"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "3030:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://backend:8000
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
