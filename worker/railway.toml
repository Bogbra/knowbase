[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# Builds from backend/, not this project's own Dockerfile: the real ARQ task
# registry (ingest_document_task, run_agent_task) lives in
# backend/app/workers/arq_settings.py, matching what docker-compose.yml runs
# locally. This project's own WorkerSettings.functions is an empty stub — see
# worker/README.md.
startCommand = "python -m arq app.workers.arq_settings.WorkerSettings"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
