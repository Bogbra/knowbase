app = "knowbase-api"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  # Runs in a fresh machine before traffic is cut over to the new release —
  # mirrors railway.toml's startCommand so a schema change can never be
  # forgotten on either platform.
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services.tcp_checks]]
  grace_period = "10s"
  interval = "30s"
  restart_limit = 3
  timeout = "5s"
